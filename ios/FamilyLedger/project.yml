name: FamilyLedger
options:
  bundleIdPrefix: com.familyledger
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
configFiles:
  Debug: Config/Config.xcconfig
  Release: Config/Config.xcconfig
targets:
  FamilyLedger:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.familyledger.ios
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - FamilyLedgerTests
  FamilyLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FamilyLedgerTests
    dependencies:
      - target: FamilyLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.familyledger.ios.tests
